version: 2

project_name: mcp-scope

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/mcp-scope/
    binary: mcp-scope
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

brews:
  - name: mcp-scope
    repository:
      owner: SSanju
      name: homebrew-mcp-scope
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/SSanju/mcp-scope"
    description: "Transparent JSON-RPC capture, viewer, and diff tool for the Model Context Protocol"
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    install: |
      bin.install "mcp-scope"
    test: |
      assert_match "mcp-scope", shell_output("#{bin}/mcp-scope --help 2>&1", 2)

release:
  github:
    owner: SSanju
    name: mcp-scope
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
